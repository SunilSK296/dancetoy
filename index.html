<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Dancing Toy</title>

<style>
body { margin:0; overflow:hidden; background:#0f0f17; }
#ui {
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:15px;
border-radius:10px;
}
</style>

</head>

<body>

<div id="ui">
Mass <input type="range" id="m" min="0.1" max="1" step="0.1" value="0.3"><br>
Stiffness <input type="range" id="k" min="10" max="500" value="120"><br>
Damping <input type="range" id="c" min="0.1" max="10" step="0.1" value="1"><br>
Frequency <input type="range" id="f" min="1" max="30" value="12"><br>
<div id="info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="main.js"></script>

</body>
</html>
