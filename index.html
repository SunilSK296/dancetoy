<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dancing Dashboard Toy Simulator</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

    <header>
        <h1>🧸 Dancing Dashboard Toy Simulator</h1>
        <p>Spring–Mass–Damper Visualization</p>
    </header>

    <div class="main">

        <!-- LEFT PANEL -->
        <div class="panel">

            <h2>🎛 Controls</h2>

            <label>Mass (kg)</label>
            <input type="range" id="mass" min="0.1" max="1" step="0.05" value="0.3">

            <label>Spring Stiffness (N/m)</label>
            <input type="range" id="k" min="10" max="500" value="120">

            <label>Damping</label>
            <input type="range" id="c" min="0.1" max="10" step="0.1" value="1">

            <label>Input Frequency (Hz)</label>
            <input type="range" id="freq" min="1" max="30" value="12">

            <div class="metrics">
                <div id="fnBox"></div>
                <div id="ampBox"></div>
                <div id="status"></div>
            </div>

        </div>

        <!-- CENTER ANIMATION -->
        <div class="animation">
            <canvas id="toyCanvas"></canvas>
        </div>

        <!-- RIGHT PANEL -->
        <div class="graphs">
            <canvas id="freqChart"></canvas>
            <canvas id="timeChart"></canvas>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
