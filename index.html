<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dancing Dashboard Toy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧸 Dancing Dashboard Toy Simulator</h1>

<div class="container">

    <!-- Controls -->
    <div class="controls">
        <h2>Controls</h2>

        <label>Mass (kg)</label>
        <input type="range" id="mass" min="0.1" max="1" step="0.1" value="0.3">

        <label>Spring Stiffness (k)</label>
        <input type="range" id="k" min="10" max="500" value="120">

        <label>Damping (c)</label>
        <input type="range" id="c" min="0.1" max="10" step="0.1" value="1">

        <label>Frequency (Hz)</label>
        <input type="range" id="freq" min="1" max="30" value="10">

        <p id="info"></p>
    </div>

    <!-- Animation -->
    <div class="animation">
        <canvas id="canvas"></canvas>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
